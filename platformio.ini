[platformio]
src_dir = src
default_envs = main_node

; ---------- shared base ----------
[env]
framework = arduino
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
build_flags =
  -D FW_VERSION=\"0.2.0\"
lib_deps =
  sandeepmistry/LoRa@^0.8.0

; ---------- Band-Node (worn wristband) ----------
; ESP32-C3 + MPU6050 (fall/tap) + MAX30102 (HR/SpO2) + UWB + LoRa + Buzzer
[env:band_node]
platform = espressif32@^6.7.0
board = esp32-c3-devkitm-1
board_build.partitions = partitions/band_node.csv
build_src_filter = +<band_node/**>
build_flags =
  ${env.build_flags}
  -D DEVICE_TYPE_BAND_NODE=1
  -D ARDUINO_USB_MODE=1
  -D ARDUINO_USB_CDC_ON_BOOT=1
lib_deps =
  ${env.lib_deps}
  adafruit/Adafruit MPU6050@^2.2.6
  sparkfun/SparkFun MAX3010x Pulse and Proximity Sensor Library@^1.1.2

; ---------- ResQ-Pin (anchor tower, LoRa relay) ----------
; ESP32 DevKit + LoRa only. Reports RSSI of bands it hears each TDMA slot.
[env:resq_pin]
platform = espressif32@^6.7.0
board = esp32dev
board_build.partitions = partitions/resq_pin.csv
build_src_filter = +<resq_pin/**>
build_flags =
  ${env.build_flags}
  -D DEVICE_TYPE_RESQ_PIN=1

; ---------- ResQ-Node (rescuer handheld) ----------
; ESP32 DevKit + LoRa + DW3000 UWB + OLED. Receives assignments, ranges UWB.
[env:resq_node]
platform = espressif32@^6.7.0
board = esp32dev
board_build.partitions = partitions/resq_node.csv
build_src_filter = +<resq_node/**>
build_flags =
  ${env.build_flags}
  -D DEVICE_TYPE_RESQ_NODE=1
lib_deps =
  ${env.lib_deps}
  adafruit/Adafruit SH110X@^2.1.11
  adafruit/Adafruit GFX Library@^1.11.10

; ---------- ResQ-MainNode (dispatch hub) ----------
; ESP32-S3 (native USB CDC for WebSerial). TDMA coordinator + triage + dispatch.
[env:main_node]
platform = espressif32@^6.7.0
board = esp32-s3-devkitc-1
board_build.partitions = partitions/main_node.csv
build_src_filter = +<main_node/**>
build_flags =
  ${env.build_flags}
  -D DEVICE_TYPE_MAIN_NODE=1
  -D ARDUINO_USB_MODE=1
  -D ARDUINO_USB_CDC_ON_BOOT=1
; Native USB CDC has no real DTR/RTS, so use usb_reset for auto-bootloader.
; First flash still needs manual BOOT button; subsequent ones may auto-reset.
upload_speed = 921600
upload_flags =
  --before=usb_reset
  --after=hard_reset
lib_deps =
  ${env.lib_deps}
  bblanchon/ArduinoJson@^7.2.0
