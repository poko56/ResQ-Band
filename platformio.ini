[platformio]
src_dir = src
default_envs = wristband

[env]
framework = arduino
monitor_speed = 115200
monitor_filters = esp32_exception_decoder, colorize
build_flags =
  -D FW_VERSION=\"0.1.0\"
  -D OTA_CHECK_INTERVAL_MS=21600000
  -D OTA_CHUNK_SIZE=240
  -D OTA_MAX_RETRY=3
lib_deps =
  sandeepmistry/LoRa@^0.8.0

[env:wristband]
platform = espressif32@^6.7.0
board = esp32-c3-devkitm-1
board_build.partitions = partitions/wristband.csv
build_src_filter = +<wristband/**>
build_flags =
  ${env.build_flags}
  -D DEVICE_TYPE_WRISTBAND=1
  -D ARDUINO_USB_MODE=1
  -D ARDUINO_USB_CDC_ON_BOOT=1
lib_deps =
  ${env.lib_deps}
  adafruit/Adafruit MPU6050@^2.2.6
  sparkfun/SparkFun MAX3010x Pulse and Proximity Sensor Library@^1.1.2

[env:gateway]
platform = espressif32@^6.7.0
board = esp32dev
board_build.partitions = partitions/gateway.csv
build_src_filter = +<gateway/**>
build_flags =
  ${env.build_flags}
  -D DEVICE_TYPE_GATEWAY=1
lib_deps =
  ${env.lib_deps}
  mobizt/FirebaseClient@^1.4.0

[env:handheld]
platform = espressif32@^6.7.0
board = esp32dev
board_build.partitions = partitions/handheld.csv
build_src_filter = +<handheld/**>
build_flags =
  ${env.build_flags}
  -D DEVICE_TYPE_HANDHELD=1
lib_deps =
  ${env.lib_deps}
  adafruit/Adafruit SH110X@^2.1.11
  adafruit/Adafruit GFX Library@^1.11.10

[env:main_hub]
platform = espressif32@^6.7.0
board = esp32dev
board_build.partitions = partitions/main_hub.csv
build_src_filter = +<main_hub/**>
build_flags =
  ${env.build_flags}
  -D DEVICE_TYPE_MAIN_HUB=1
lib_deps =
  ${env.lib_deps}
  links2004/WebSockets@^2.6.1
  bblanchon/ArduinoJson@^7.2.0
